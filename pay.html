<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد عملية الشراء - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background-color: #6700eb; color: white; text-align: center; font-family: Arial, sans-serif; padding: 50px 20px; }
        .payment-card { background: white; color: #333; padding: 20px; border-radius: 15px; display: inline-block; max-width: 400px; width: 100%; }
        .btn-pay { background-color: #00d64f; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        .price { font-size: 2rem; color: #6700eb; font-weight: bold; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>تأكيد الطلب</h2>
        <p>أنت على وشك شراء هاتف ذكي</p>
        <div class="price">8300 Pi</div>
        <button class="btn-pay" id="pay-button">دفع الآن بواسطة Pi</button>
        <p id="status" style="margin-top:15px; color: #666;"></p>
    </div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });

        const payButton = document.getElementById('pay-button');
        const status = document.getElementById('status');

        payButton.onclick = async () => {
            try {
                status.innerText = "جاري تحضير المعاملة...";
                
                const payment = await Pi.createPayment({
                    amount: 8300,
                    memo: "شراء هاتف من متجر Mobiles.pi",
                    metadata: { productId: "iphone-15-pro" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        status.innerText = "في انتظار موافقة الخادم...";
                        // هنا عادة يتم إرسال المعاملة لخادمك، لكن للتجربة سنكتفي بذلك
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        status.innerText = "تم الدفع بنجاح! جاري العودة للمتجر...";
                        setTimeout(() => {
                            window.location.href = "https://mobiles-pi-store.carrd.co/";
                        }, 3000);
                    },
                    onCancel: (paymentId) => { status.innerText = "تم إلغاء العملية."; },
                    onError: (error, payment) => { status.innerText = "حدث خطأ في الدفع."; }
                });
            } catch (err) {
                console.error(err);
                status.innerText = "يرجى المحاولة من داخل Pi Browser.";
            }
        };
    </script>
</body>
</html>
